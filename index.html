<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>C7 OTA Hub | Regulation Cover</title>
  <style>
    :root {
      --ink: #14283c;
      --muted: #4d6073;
      --line: #c9d5e2;
      --paper: #f4f7fb;
      --panel: rgba(255, 255, 255, 0.95);
      --seal: #0f4f8f;
      --seal-2: #0a3966;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.85), rgba(255,255,255,0.85)),
        repeating-linear-gradient(180deg, rgba(15,79,143,0.05) 0, rgba(15,79,143,0.05) 1px, transparent 1px, transparent 34px),
        linear-gradient(180deg, #eef3f9 0%, #e8eef6 100%);
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .cover {
      width: min(920px, 100%);
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: 0 20px 42px rgba(20, 40, 60, 0.12);
      overflow: hidden;
    }

    .top-bar {
      height: 10px;
      background: linear-gradient(90deg, var(--seal-2), var(--seal));
    }

    .main {
      padding: clamp(22px, 4vw, 40px);
      display: grid;
      gap: 18px;
    }

    .tag {
      margin: 0;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #5e7691;
    }

    h1 {
      margin: 0;
      font-size: clamp(34px, 7vw, 72px);
      line-height: 0.98;
      letter-spacing: 0.02em;
      color: var(--seal-2);
    }

    .subtitle {
      margin: 0;
      max-width: 760px;
      color: var(--muted);
      line-height: 1.75;
      font-size: 15px;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .badge {
      border: 1px solid #bfd0e3;
      border-radius: 999px;
      background: #f2f7fc;
      color: #23507c;
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 4px;
    }

    .btn {
      min-height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 10px 16px;
      border-radius: 999px;
      border: 1px solid #c4d7ea;
      background: #ffffff;
      color: #1d476f;
      text-decoration: none;
      font-size: 13px;
      font-weight: 800;
    }

    .btn.primary {
      border-color: transparent;
      color: #fff;
      background: linear-gradient(135deg, #0f4f8f, #0c4277);
    }

    .footer {
      border-top: 1px solid #d6e1eb;
      padding: 12px clamp(22px, 4vw, 40px);
      font-size: 12px;
      color: #687a8d;
      background: #f7fafd;
    }
  </style>
</head>
<body>
  <section class="cover" role="region" aria-label="C7 OTA regulation portal cover">
    <div class="top-bar"></div>
    <div class="main">
      <p class="tag">C7 OTA Regulation Portal</p>
      <h1>C7 OTA Hub</h1>
      <p class="subtitle">
        法规官网封面版入口。站点仅发布 C7 OTA 法规门户能力，聚焦章节化浏览、条款检索、命中高亮与中英切换。
      </p>
      <div class="meta">
        <span class="badge">5 Chapters</span>
        <span class="badge">Bilingual</span>
        <span class="badge">Clause Finder</span>
        <span class="badge">Policy Review</span>
      </div>
      <div class="actions">
        <a class="btn primary" href="c7_regulation_tabs.html">进入法规门户</a>
        <a class="btn" href="README.md">查看仓库说明</a>
      </div>
    </div>
    <div class="footer">C7 OTA Hub | Public Regulatory Cover</div>
  </section>
</body>
</html>
