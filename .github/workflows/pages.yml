name: Deploy C7 OTA Hub

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Stage minimal site
        run: |
          mkdir -p out
          cp index.html out/index.html
          cp c7_regulation_tabs.html out/c7_regulation_tabs.html
          if [ -d assets ]; then cp -R assets out/assets; fi
          touch out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4name: Deploy Portfolio Landing

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build skills catalog
        run: |
          python3 scripts/build_skills_catalog.py --repo ttoriaa/vikipedia --output assets/skills-catalog.json

      - name: Prepare site artifact
        run: |
          rm -rf out
          mkdir -p out/assets/landing-previews
          test -d site
          cp -R site/. out/
          if [ -d market_watch ]; then
            cp -R market_watch out/market_watch
          fi
          cp index.html out/index.html
          if [ -d assets/landing-previews ]; then
            cp assets/landing-previews/*.png out/assets/landing-previews/
          fi
          if [ -f assets/profile.jpg ]; then
            cp assets/profile.jpg out/assets/profile.jpg
          fi
          if [ -f assets/github-projects.json ]; then
            cp assets/github-projects.json out/assets/github-projects.json
          fi
          if [ -f assets/skills-catalog.json ]; then
            cp assets/skills-catalog.json out/assets/skills-catalog.json
          fi
          if [ -d assets/token ]; then
            mkdir -p out/assets
            cp -R assets/token out/assets/token
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
