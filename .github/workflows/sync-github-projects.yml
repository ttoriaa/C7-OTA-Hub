name: Sync GitHub Projects Feed

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh projects feed
        env:
          GITHUB_SYNC_USERNAME: ttoriaa
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/sync_github_projects.py --output assets/github-projects.json --limit 9

      - name: Commit changes
        run: |
          if git diff --quiet -- assets/github-projects.json; then
            echo "No feed changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-projects.json
          git commit -m "chore: sync GitHub projects feed"
          git push
