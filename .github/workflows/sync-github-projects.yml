name: Sync GitHub Projects Feed

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Refresh projects feed
        env:
          GITHUB_SYNC_USERNAME: ttoriaa
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_SYNC_INCLUDE_HOMEPAGE_ANY_DOMAIN: ${{ vars.GITHUB_SYNC_INCLUDE_HOMEPAGE_ANY_DOMAIN }}
        run: |
          EXTRA_ARGS=""
          INCLUDE_FLAG="${GITHUB_SYNC_INCLUDE_HOMEPAGE_ANY_DOMAIN:-false}"
          INCLUDE_FLAG_LOWER=$(echo "$INCLUDE_FLAG" | tr '[:upper:]' '[:lower:]')
          if [ "$INCLUDE_FLAG_LOWER" = "true" ] || [ "$INCLUDE_FLAG_LOWER" = "1" ] || [ "$INCLUDE_FLAG_LOWER" = "yes" ]; then
            EXTRA_ARGS="--include-homepage-any-domain"
          fi

          python scripts/sync_github_projects.py --output assets/github-projects.json --limit 9 $EXTRA_ARGS

      - name: Commit changes
        run: |
          if git diff --quiet -- assets/github-projects.json; then
            echo "No feed changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/github-projects.json
          git commit -m "chore: sync GitHub projects feed"
          git push
